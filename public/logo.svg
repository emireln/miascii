<?xml version="1.0" encoding="UTF-8"?>
<!--
  miascii mascot v2 — rounded, iconic, minimal.

  Design direction inspired by Claude Code's icon: organic + smooth, instantly
  readable silhouette, no fussy pixel-art detail. Single-color (white) features
  on a deep-black rounded square, so the icon works the same whether the OS
  taskbar / desktop is dark or light.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- subtle top-to-bottom fade on the background, gives the icon a tiny
         bit of depth without looking busy -->
    <linearGradient id="mi-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#1a1a1a"/>
      <stop offset="1"   stop-color="#050505"/>
    </linearGradient>
  </defs>

  <!-- dark rounded container (the "app chip") -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#mi-bg)"/>

  <!-- antenna: thin stem + rounded bulb -->
  <rect x="244" y="72" width="24" height="56" rx="12" fill="#ffffff"/>
  <circle cx="256" cy="62" r="18" fill="#ffffff"/>

  <!-- head: single smooth squircle, no pixel border noise -->
  <rect x="104" y="132" width="304" height="296" rx="72" ry="72" fill="#ffffff"/>

  <!-- ear / bolt knobs (slim, rounded) -->
  <rect x="80"  y="240" width="28" height="80" rx="12" fill="#ffffff"/>
  <rect x="404" y="240" width="28" height="80" rx="12" fill="#ffffff"/>

  <!-- friendly eyes: two solid dark dots on the white head, nothing scary -->
  <circle cx="196" cy="256" r="22" fill="#0a0a0a"/>
  <circle cx="316" cy="256" r="22" fill="#0a0a0a"/>

  <!-- tiny highlight on each eye so the robot looks awake, not dead -->
  <circle cx="204" cy="248" r="6" fill="#ffffff"/>
  <circle cx="324" cy="248" r="6" fill="#ffffff"/>

  <!-- chill smile: slight upward curve, rounded -->
  <path d="M 208 340 Q 256 370 304 340"
        fill="none" stroke="#0a0a0a" stroke-width="14" stroke-linecap="round"/>
</svg>
