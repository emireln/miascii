appId: com.miascii.app
productName: miascii
copyright: Copyright © 2026 miascii
publish:
  provider: github
  owner: emireln
  repo: miascii
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.cjs

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-setup-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.graphics-design
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Graphics
  synopsis: Text · image · video to ASCII art — fully client-side
  artifactName: ${productName}-${version}-${arch}.${ext}
