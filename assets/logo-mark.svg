<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <!-- Minimal wordmark: used for small favicons where the mascot blurs out -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0a0a"/>
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.35"/>

  <!-- Big m.i wordmark, centered -->
  <text x="256" y="300"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="256"
        font-weight="800"
        letter-spacing="-8"
        fill="#ffffff">m.i</text>

  <!-- tag line -->
  <text x="256" y="372"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="36"
        font-weight="600"
        letter-spacing="16"
        fill="#ffffff"
        fill-opacity="0.6">ASCII</text>

  <!-- blinking caret block accent -->
  <rect x="372" y="196" width="28" height="80" fill="#ffffff"/>
</svg>
