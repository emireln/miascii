<?xml version="1.0" encoding="UTF-8"?>
<!--
  Small-size variant used for taskbar, tray, title bar, and favicon at <=48px.
  Transparent background (no rounded square) so anti-aliased edges blend
  cleanly on any dark OR light taskbar theme instead of fringing.

  Works in BOTH dark and light taskbars because we don't paint a solid
  container; only the glyph is drawn.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- m.i wordmark in solid white, centered. No rounded container, no inner
       stroke — those were the source of the bright corner fringes when the
       icon was downscaled to 16/24/32 px -->
  <text x="256" y="380"
        text-anchor="middle"
        font-family="'Consolas', 'Menlo', monospace"
        font-size="360"
        font-weight="900"
        letter-spacing="-18"
        fill="#ffffff">m.i</text>
</svg>
